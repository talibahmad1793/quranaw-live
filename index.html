<!doctype html>
<html lang="en">
  <head>

    <link rel="canonical" href="https://quranaw.com/" />
    <meta name="robots" content="index, follow" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="QuranAnyWhere" />
    <meta property="og:title" content="QuranAnyWhere — Read the Qur'an and Hadith Online, Free" />

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "QuranAnyWhere",
      "url": "https://quranaw.com/",
      "description": "Read the Qur'an juz by juz and explore Hinglish translations of major hadith collections online, free.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://quranaw.com/#/search/{search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Karla:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=8" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    </script>
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a href="#/" class="brand">
          <svg width="26" height="26" viewBox="0 0 26 26" fill="none" aria-hidden="true">

          </svg>

        </a>
        <a href="#/search" class="header-search-link" aria-label="Search">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <circle cx="8.5" cy="8.5" r="6" stroke="currentColor" stroke-width="1.6"/>
            <line x1="13" y1="13" x2="18" y2="18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          <span>Search</span>
        </a>
      </div>
    </header>

    <div id="app"></div>

    <footer>
      We're currently working on translating more hadith collections into Hinglish — more collections coming soon, Insha'Allah.
    </footer>

    <script src="config.js?v=8"></script>
    <script src="app.js?v=8"></script>
