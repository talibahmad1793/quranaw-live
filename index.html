<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuranAnyWhere</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Karla:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    </script>
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a href="#/" class="brand">
          <svg width="26" height="26" viewBox="0 0 26 26" fill="none" aria-hidden="true">
            <path d="M13 2 L15.2 9.8 L23 12 L15.2 14.2 L13 22 L10.8 14.2 L3 12 L10.8 9.8 Z" fill="var(--gold)" />
          </svg>
          <span class="brand-text" data-site-title>QuranAnyWhere</span>
        </a>
        <a href="#/search" class="header-search-link" aria-label="Search">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <circle cx="8.5" cy="8.5" r="6" stroke="currentColor" stroke-width="1.6"/>
            <line x1="13" y1="13" x2="18" y2="18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          <span>Search</span>
        </a>
      </div>
    </header>

    <div id="app"></div>

    <footer>
      Content is read live from GitHub — add a folder of PDFs to the repo and it appears here automatically.
    </footer>

    <script src="config.js?v=2"></script>
    <script src="app.js?v=2"></script>
  </body>
</html>
